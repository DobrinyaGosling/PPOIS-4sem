version: '3.8'

services:

  db:
    image: postgres:16
    container_name: db_lab_2
    env_file: .env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network


volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
